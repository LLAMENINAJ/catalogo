,"wide leg"],"category":"CALÇA","link":"https://llamenina.com.br/produtos/wide-leg-w725-11fh8/","images":["https://acdn-us.mitiendanube.com/stores/006/733/415/products/w725_jeansclaro_01-7439606a80467e894a17815516378644-1024-1024.jpg","https://acdn-us.mitiendanube.com/stores/006/733/415/products/w725_jeansclaro_02-137afb15ac0c82949917815516401921-1024-1024.jpg","https://acdn-us.mitiendanube.com/stores/006/733/415/products/w725_jeansclaro_03-69f7609a9c4dbd129017815516422549-1024-1024.jpg","https://acdn-us.mitiendanube.com/stores/006/733/415/products/w725_jeansclaro_04-beba4f097c22bdea9e17815516445536-1024-1024.jpg","https://acdn-us.mitiendanube.com/stores/006/733/415/products/w725_jeansclaro_05-e2385b74a431ddf34717815516469893-1024-1024.jpg"],"stock":[{"color":"JEANS CLARO","sizes":[{"s":"36","q":1},{"s":"46","q":1}]}]}],"updatedAt":"2026-07-24T14:04:34.332Z","apiBase":"https://llacrm.com","vendedoras":[],"catOrder":[],"itemOrderByCat":{},"vendedoraFixa":"DAYANA DA SILVA DUTRA","tabelaPreco":"varejo","showcase":false,"promocao":false}</script>
<script>
var D=JSON.parse(document.getElementById('d').textContent);
var params=new URLSearchParams(location.search);
var state={q:'',cat:params.get('cat')||''};
var cats=[];D.items.forEach(function(p){if(p.category&&cats.indexOf(p.category)<0)cats.push(p.category)});cats.sort();
// Ordem custom das categorias (definida no CRM em Configurações -> Catálogo); o resto segue alfabético
if(D.catOrder&&D.catOrder.length){
  var catPos=function(c){for(var i=0;i<D.catOrder.length;i++){if(String(D.catOrder[i]).toLowerCase()===c.toLowerCase())return i}return 999};
  cats.sort(function(a,b){return catPos(a)-catPos(b)||a.localeCompare(b)});
}
if(state.cat&&!cats.some(function(c){return c.toLowerCase()===state.cat.toLowerCase()}))state.cat='';
var CARTKEY='lla_cart_'+D.mode;
var cart=[];try{cart=JSON.parse(localStorage.getItem(CARTKEY)||'[]')||[]}catch(e){cart=[]}
// Sacola salva por versão antiga (sem "max"): garante o teto (estoque da variação; 99 = sem controle)
cart.forEach(function(x){x.max=x.max||99;if(x.qty>x.max)x.qty=x.max});
function saveCart(){try{localStorage.setItem(CARTKEY,JSON.stringify(cart))}catch(e){}}
function money(n){return 'R$ '+Number(n||0).toFixed(2).replace('.',',')}
// Preço da tabela ativa (varejo/atacado). Atacado sem preço cai no varejo (defensivo).
function PRICE(p){return (D.tabelaPreco==='atacado'&&Number(p.priceAtacado)>0)?Number(p.priceAtacado):Number(p.price||0)}
// preço "de" (cheio) só no VAREJO com promoção (priceFull > preço atual); 0 = sem promoção
function priceFull(p){if(D.tabelaPreco==='atacado')return 0;var f=Number(p.priceFull||0),c=Number(p.price||0);return (f>c&&c>0)?f:0}
// markup do preço: com promoção mostra o cheio riscado + o novo + selo "Promoção"
function priceHtml(p){var cur=PRICE(p),full=priceFull(p);
  if(full>0)return '<span class="promo"><span class="was">'+money(full)+'</span><span class="now">'+money(cur)+'</span><span class="ptag">Promoção</span></span>';
  return money(cur)}
function esc(s){var d=document.createElement('span');d.textContent=String(s==null?'':s);return d.innerHTML}
function digits(s){return String(s||'').replace(/\D/g,'')}
var toastT=null;
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('on')},1600)}

function chips(){
  var el=document.getElementById('chips'),h='';
  h+='<button class="chip'+(state.cat?'':' on')+'" data-c="">Todas</button>';
  cats.forEach(function(c){h+='<button class="chip'+(state.cat.toLowerCase()===c.toLowerCase()?' on':'')+'" data-c="'+esc(c)+'">'+esc(c)+'</button>'});
  el.innerHTML=h;
  el.querySelectorAll('.chip').forEach(function(b){b.onclick=function(){state.cat=b.getAttribute('data-c');
    var u=new URL(location.href);if(state.cat)u.searchParams.set('cat',state.cat);else u.searchParams.delete('cat');
    history.replaceState(null,'',u);chips();grid()}});
}
function filtered(){
  var q=state.q.toLowerCase();
  return D.items.filter(function(p){
    var okQ=!q||p.name.toLowerCase().indexOf(q)>=0||(p.ref||'').toLowerCase().indexOf(q)>=0;
    var okC=!state.cat||(p.category||'').toLowerCase()===state.cat.toLowerCase();
    return okQ&&okC});
}
// Quantidades por variação ficam OCULTAS na página (a contagem continua valendo por trás:
// limite da sacola e validação no lançamento usam o estoque normalmente).
function sizeChips(p,limit){
  var h='',shown=0;
  (p.stock||[]).forEach(function(c){
    if(shown>=limit)return;shown++;
    h+='<div class="srow"><span class="sz" style="background:#fff;border-color:#e2e8f0">'+esc(c.color)+'</span>';
    (c.sizes||[]).forEach(function(s){h+='<span class="sz">'+esc(s.s)+'</span>'});
    h+='</div>'});
  var extra=(p.stock||[]).length-limit;
  if(extra>0)h+='<div class="more">+'+extra+' cores</div>';
  return h;
}
// Tamanhos DISPONÍVEIS (distintos entre as cores). Se o produto tem controle de estoque, só entra tam com q>0;
// sem controle (q ausente em tudo), mostra todos. Usado no catálogo só-foto ("Disponível nos tamanhos ...").
function availSizes(p){
  var stock=p.stock||[];
  var controlado=stock.some(function(c){return (c.sizes||[]).some(function(s){return s.q!==undefined&&s.q!==null})});
  var set={};
  stock.forEach(function(c){(c.sizes||[]).forEach(function(s){ if(!controlado||Number(s.q)>0)set[s.s]=1; })});
  var order=['PP','P','M','G','GG','XG','U'],arr=Object.keys(set);
  arr.sort(function(a,b){var ia=order.indexOf(a),ib=order.indexOf(b);if(ia<0)ia=99;if(ib<0)ib=99;return ia!==ib?ia-ib:(parseInt(a)||0)-(parseInt(b)||0);});
  return arr;
}
function szLine(p){var a=availSizes(p);if(!a.length)return '';return '<div class="szline">Disponível nos tamanhos: <b>'+a.map(esc).join(', ')+'</b></div>';}
// Ordem custom DENTRO da categoria filtrada (definida no CRM); sem ordem, mantém a global
function orderForCat(){
  if(!state.cat||!D.itemOrderByCat)return null;
  for(var k in D.itemOrderByCat){if(k.toLowerCase()===state.cat.toLowerCase())return D.itemOrderByCat[k]}
  return null;
}
function grid(){
  var list=filtered(),el=document.getElementById('grid'),h='';
  var ord=orderForCat();
  if(ord&&ord.length){
    var pos=function(id){var i=ord.indexOf(String(id));return i<0?9999:i};
    list=list.slice().sort(function(a,b){return pos(String(a.id))-pos(String(b.id))});
  }
  document.getElementById('meta').textContent=list.length+' produtos';
  if(!list.length){el.innerHTML='<div class="empty" style="grid-column:1/-1">Nenhuma peça encontrada.</div>';return}
  list.forEach(function(p){
    h+='<div class="card" data-i="'+D.items.indexOf(p)+'"><div class="ph">';
    h+=p.images&&p.images[0]?'<img loading="lazy" src="'+esc(p.images[0])+'" alt="'+esc(p.name)+'">':'';
    h+='</div><div class="cbody"><div class="nm">'+esc(p.name)+'</div>'+(D.showcase?'':'<div class="pr">'+priceHtml(p)+'</div>')+sizeChips(p,2)+'</div></div>'});
  el.innerHTML=h;
  el.querySelectorAll('.card').forEach(function(c){c.onclick=function(){openM(Number(c.getAttribute('data-i')))}});
}

// ---------- SACOLA ----------
function cartQty(id,color,size){var f=cart.find(function(x){return x.id===id&&x.color===color&&x.size===size});return f?f.qty:0}
function cartCount(){return cart.reduce(function(a,x){return a+x.qty},0)}
function cartTotal(){return cart.reduce(function(a,x){return a+x.qty*x.price},0)}
function fab(){var f=document.getElementById('fab');if(D.showcase){f.classList.remove('on');return}var n=cartCount();
  f.classList.toggle('on',n>0);document.getElementById('fabn').textContent=n;document.getElementById('fabt').textContent=money(cartTotal())}
// Toque no chip adiciona 1; depois o chip vira stepper [− tam·qtd +] pra ajustar direto no produto.
// Teto = ESTOQUE da variação (MEGA e site); 99 só quando a variação não tem controle de estoque.
function changeQty(p,color,s,delta){
  var max=(typeof s.q==='number'&&s.q>0)?s.q:99;
  var i=cart.findIndex(function(x){return x.id===p.id&&x.color===color&&x.size===s.s});
  if(i<0){
    if(delta>0){cart.push({id:p.id,name:p.name,price:PRICE(p),image:(p.images||[])[0]||'',color:color,size:s.s,qty:1,max:max});toast('Adicionado à sacola ✓')}
  } else {
    var x=cart[i];
    if(delta>0&&x.qty>=max){toast('Só tem '+max+' desse tamanho');return}
    x.qty+=delta;
    if(x.qty<=0){cart.splice(i,1);toast('Removido da sacola')}
  }
  saveCart();fab();
}

var curIdx=-1;
function openM(i){
  curIdx=i;
  var p=D.items[i],m=document.getElementById('modal'),sh=document.getElementById('sheet');
  sh.classList.remove('solo');
  var h='';
  h+='<button class="close" id="x">✕</button>';
  h+='<div class="gal">';
  var imgs=p.images||[];
  if(imgs.length){
    h+='<div class="galmain"><img class="main" id="mainimg" src="'+esc(imgs[0])+'">';
    if(imgs.length>1)h+='<button class="navb prev" id="galprev" aria-label="anterior">‹</button><button class="navb next" id="galnext" aria-label="próxima">›</button>';
    h+='</div>';
    if(imgs.length>1){h+='<div class="thumbs">';imgs.forEach(function(im,k){h+='<img src="'+esc(im)+'" data-k="'+k+'" class="'+(k===0?'on':'')+'">'});h+='</div>';}
  }
  h+='</div><div class="info">';
  if(D.showcase){
    h+='<span class="tag">'+(p.ref?'Ref. '+esc(p.ref):'Catálogo')+'</span>';
    h+='<h2>'+esc(p.name)+'</h2>';
    // Cor + tamanhos disponíveis (igual aos outros catálogos), mas SÓ visual — sem selecionar/comprar.
    h+='<div class="stock"><h4>Cores e tamanhos disponíveis</h4>'+sizeChips(p,99)+'</div>';
    h+='<div class="hint" style="margin-top:12px">Fale com sua vendedora no WhatsApp pra fechar o pedido. 💜</div>';
  } else {
    h+='<span class="tag">'+esc(p.category||'Geral')+(p.ref?' · Ref. '+esc(p.ref):'')+'</span>';
    h+='<h2>'+esc(p.name)+'</h2><div class="p">'+priceHtml(p)+'</div>';
    h+='<div class="stock"><h4>'+(D.mode==='mega'?'Disponível agora na loja':'Cores e tamanhos disponíveis')+'</h4>';
    h+='<div class="hint">Toque no tamanho pra escolher e use − / + pra quantidade</div>';
    h+=stockRows(p);
    h+='</div>';
    h+='<div id="mcta"></div>';
  }
  h+='<div class="foot">'+(D.mode==='mega'?'Pronta entrega na loja física':'LLAMENINA')+'</div></div>';
  sh.innerHTML=h;m.classList.add('on');document.body.style.overflow='hidden';
  document.getElementById('x').onclick=closeM;
  m.onclick=function(e){if(e.target===m)closeM()};
  if(!D.showcase){bindStock(p,sh);renderMcta();}
  // galeria: capa aberta + miniaturas embaixo + setinhas (dão a volta). Tocar na capa abre em tela cheia.
  var gi=0, gimgs=p.images||[];
  var showImg=function(k){ if(!gimgs.length)return; gi=(k+gimgs.length)%gimgs.length; var mi=document.getElementById('mainimg'); if(mi)mi.src=gimgs[gi]; sh.querySelectorAll('.thumbs img').forEach(function(o){o.classList.toggle('on',Number(o.getAttribute('data-k'))===gi)}); };
  var gp=document.getElementById('galprev'); if(gp)gp.onclick=function(e){e.stopPropagation();showImg(gi-1)};
  var gn=document.getElementById('galnext'); if(gn)gn.onclick=function(e){e.stopPropagation();showImg(gi+1)};
  sh.querySelectorAll('.thumbs img').forEach(function(t){t.onclick=function(){showImg(Number(t.getAttribute('data-k')))}});
  var mi0=document.getElementById('mainimg'); if(mi0)mi0.onclick=function(){openLightbox(mi0.src)};
}
// Toque numa foto -> abre em tela cheia (toque de novo fecha). Overlay criado uma vez.
function openLightbox(src){
  var lb=document.getElementById('lb');
  if(!lb){lb=document.createElement('div');lb.id='lb';lb.className='lb';lb.innerHTML='<img>';document.body.appendChild(lb);lb.onclick=function(){lb.classList.remove('on')};}
  lb.querySelector('img').src=src;lb.classList.add('on');
}
function stockRows(p){
  var h='';
  (p.stock||[]).forEach(function(c,ci){
    h+='<div class="crow"><div class="cn"><span class="dot"></span>'+esc(c.color)+'</div><div class="szs">';
    (c.sizes||[]).forEach(function(s,si){
      var inC=cartQty(p.id,c.color,s.s);
      if(inC){
        h+='<span class="szsel"><button data-ci="'+ci+'" data-si="'+si+'" data-d="-1">−</button>'
          +'<span class="lb">'+esc(s.s)+' · '+inC+'</span>'
          +'<button data-ci="'+ci+'" data-si="'+si+'" data-d="1">+</button></span>';
      } else {
        h+='<button class="szbtn" data-ci="'+ci+'" data-si="'+si+'" data-d="1">'+esc(s.s)+'</button>';
      }
    });
    h+='</div></div>'});
  return h;
}
function renderMcta(){
  var el=document.getElementById('mcta');if(!el)return;
  var n=cartCount();
  el.innerHTML=n?'<button class="cta" id="mfin">Finalizar Pedido · '+n+(n>1?' peças':' peça')+' · '+money(cartTotal())+'</button>':'';
  var b=document.getElementById('mfin');
  if(b)b.onclick=function(){closeM();openCart()};
}
function bindStock(p,sh){
  sh.querySelectorAll('.szbtn,.szsel button').forEach(function(b){b.onclick=function(ev){
    ev.stopPropagation();
    var c=(p.stock||[])[Number(b.getAttribute('data-ci'))];
    var s=(c.sizes||[])[Number(b.getAttribute('data-si'))];
    changeQty(p,c.color,s,Number(b.getAttribute('data-d'))||1);
    var box=sh.querySelector('.stock');
    var rows=box.querySelectorAll('.crow');rows.forEach(function(r){r.remove()});
    box.insertAdjacentHTML('beforeend',stockRows(p));bindStock(p,sh);renderMcta();
  }});
}
function closeM(){document.getElementById('modal').classList.remove('on');document.body.style.overflow=''}

// ---------- CHECKOUT ----------
var ck={step:'cart',found:null,sending:false};
function openCart(){if(D.showcase)return;lookedUp='';ck.step=cart.length?'cart':'cart';renderCart();document.getElementById('cartmodal').classList.add('on');document.body.style.overflow='hidden'}
function closeCart(){document.getElementById('cartmodal').classList.remove('on');document.body.style.overflow=''}
document.getElementById('fab').onclick=openCart;
document.getElementById('cartmodal').onclick=function(e){if(e.target===this&&ck.step!=='loading'&&!ck.sending)closeCart()};
function renderCart(){
  // Enquanto ENVIA/PROCESSA (sending/loading) trava o fechamento: sem X e sem fechar no fundo -> a cliente
  // SEMPRE vê o resultado (inclusive o "sem estoque"), não some antes do poll terminar (~40s no pior caso).
  var locked=(ck.step==='loading'||ck.sending);
  var sh=document.getElementById('cartsheet'),h=(locked?'':'<button class="close" id="cx">✕</button>')+'<div class="cartbox">';
  if(ck.step==='loading'){
    h+='<div class="done"><div class="spin"></div><h2>Enviando seu pedido...</h2><p>Só um instante — estamos lançando no sistema. Não feche esta tela. 💜</p></div>';
  } else if(ck.step==='semestoque'){
    var _sing=(ck.pecas===1);
    h+='<div class="done"><div class="ic err">!</div><h2>Pedido não gerado</h2><p>Seu pedido não foi gerado, '+(_sing?'alguma peça do seu pedido não tem em estoque':'algumas peças do seu pedido não têm em estoque')+'. Favor entrar em contato com a sua vendedora! 💜</p>';
    if(ck.avisos&&ck.avisos.length){
      h+='<div style="text-align:left;margin:14px auto 2px;max-width:360px;background:#fff5f5;border:1px solid #fadcdc;border-radius:12px;padding:10px 12px">';
      ck.avisos.forEach(function(a){h+='<div style="font-size:12px;color:#b42318;font-weight:600;margin:4px 0;line-height:1.35">• '+esc(a)+'</div>';});
      h+='</div>';
    }
    h+='</div>';
    h+='<button class="ghost" id="cback">Voltar ao catálogo</button>';
  } else if(ck.step==='done'){
    h+='<div class="done"><div class="ic">✓</div><h2>Pedido enviado!</h2><p>Recebemos seu pedido. A vendedora vai te chamar no WhatsApp pra combinar o pagamento e a entrega. 💜</p></div>';
    h+='<button class="ghost" id="cback">Voltar ao catálogo</button>';
  } else if(!cart.length){
    h+='<h2>Sacola</h2><div class="empty">Sua sacola está vazia.</div>';
  } else if(ck.step==='cart'){
    h+='<h2>Sacola</h2>';
    cart.forEach(function(x,i){
      h+='<div class="ci">'+(x.image?'<img src="'+esc(x.image)+'">':'<img>')+'<div class="t"><div class="n">'+esc(x.name)+'</div><div class="v">'+esc(x.color)+' · Tam '+esc(x.size)+'</div><div class="pp">'+money(x.price)+'</div></div>';
      h+='<div class="step"><button data-i="'+i+'" data-d="-1">−</button><span>'+x.qty+'</span><button data-i="'+i+'" data-d="1">+</button></div></div>';
    });
    h+='<div class="tot"><span>Total</span><span>'+money(cartTotal())+'</span></div>';
    if(D.apiBase){h+='<button class="cta" id="goform">Finalizar Pedido</button>';}
    else{h+='<div class="notice err on">O envio de pedidos está temporariamente indisponível — chame sua vendedora no WhatsApp.</div>';}
  } else {
    h+='<h2>Seus dados</h2>';
    h+='<div class="fld"><label>CPF ou CNPJ</label><input id="fdoc" inputmode="numeric" placeholder="000.000.000-00" autocomplete="off"></div>';
    h+='<div class="notice ok" id="fnotice"></div>';
    h+='<div class="fld"><label>Nome completo</label><input id="fnome" autocomplete="name"></div>';
    h+='<div class="fld"><label>Celular (WhatsApp)</label><input id="fcel" inputmode="tel" placeholder="(62) 90000-0000" autocomplete="tel"></div>';
    h+='<div class="frow"><div class="fld"><label>CEP</label><input id="fcep" inputmode="numeric" placeholder="00000-000" autocomplete="postal-code"></div>';
    h+='<div class="fld"><label>Número <span style="text-transform:none;font-weight:600">(opcional)</span></label><input id="fnum"></div></div>';
    h+='<div class="fld"><label>Rua</label><input id="frua"></div>';
    h+='<div class="frow"><div class="fld"><label>Bairro</label><input id="fbai"></div><div class="fld"><label>Cidade</label><input id="fcid"></div></div>';
    h+='<div class="frow"><div class="fld"><label>Estado (UF)</label><input id="fuf" maxlength="2" style="text-transform:uppercase"></div>';
    h+='<div class="fld"><label>Complemento</label><input id="fcom"></div></div>';
    h+='<div class="frow"><div class="fld"><label>Forma de pagamento</label><select id="fpag"><option value="">Escolha...</option><option value="pix">PIX</option><option value="credito">Cartão de Crédito</option></select></div>';
    h+='<div class="fld" id="fparcbox" style="display:none"><label>Parcelas (sem juros)</label><select id="fparc"></select></div></div>';
    if(D.vendedoraFixa){
      // Catálogo individual: vendedora é a dona do link. MOSTRA só o 1º nome, mas ENVIA o nome completo
      // (o elo com o Wiki é por nome exato) -> fvend OCULTO = completo; o visível (readonly) = 1º nome.
      var vprimeiro=String(D.vendedoraFixa).split(' ')[0];
      h+='<div class="fld"><label>Vendedora</label><input id="fvend" type="hidden" value="'+esc(D.vendedoraFixa)+'"><input value="'+esc(vprimeiro)+'" readonly style="background:#f1f5f9;cursor:default"></div>';
    } else {
      h+='<div class="fld"><label>Vendedora</label><select id="fvend"><option value="">Escolha...</option>';
      (D.vendedoras||[]).forEach(function(v){h+='<option value="'+esc(v)+'">'+esc(v)+'</option>'});
      h+='</select></div>';
    }
    h+='<input id="fweb" style="display:none" tabindex="-1" autocomplete="off">';
    h+='<div class="notice err" id="ferr"></div>';
    h+='<div class="tot"><span>Total</span><span>'+money(cartTotal())+'</span></div>';
    h+='<button class="cta" id="fsend">'+(ck.sending?'Enviando...':'Enviar Pedido')+'</button>';
    h+='<button class="ghost" id="cback">Voltar pra sacola</button>';
  }
  h+='</div>';
  sh.innerHTML=h;
  var cxb=document.getElementById('cx');if(cxb)cxb.onclick=closeCart;
  var back=document.getElementById('cback');if(back)back.onclick=function(){if(ck.step==='done'||ck.step==='semestoque'){cart=[];saveCart();fab();closeCart();ck.step='cart'}else{ck.step='cart';renderCart()}};
  sh.querySelectorAll('.step button').forEach(function(b){b.onclick=function(){
    var i=Number(b.getAttribute('data-i')),d=Number(b.getAttribute('data-d'));
    var x=cart[i];if(!x)return;
    var lim=x.max||99;
    if(d>0&&x.qty>=lim){toast('Só tem '+lim+' desse tamanho');return}
    x.qty+=d;if(x.qty<=0)cart.splice(i,1);
    saveCart();fab();renderCart();
  }});
  var go=document.getElementById('goform');if(go)go.onclick=function(){ck.step='form';renderCart();fillForm()};
  bindForm(sh);
}
var formData={};
function keepForm(){['fdoc','fnome','fcel','fcep','fnum','frua','fbai','fcid','fuf','fcom','fpag','fparc','fvend'].forEach(function(id){var e=document.getElementById(id);if(e)formData[id]=e.value})}
function fillForm(){Object.keys(formData).forEach(function(id){var e=document.getElementById(id);if(e)e.value=formData[id]});pagChange()}
function pagChange(){
  var pag=document.getElementById('fpag'),box=document.getElementById('fparcbox'),par=document.getElementById('fparc');
  if(!pag)return;
  if(pag.value==='credito'){box.style.display='';var t=cartTotal(),h='';
    var maxP=(D.tabelaPreco==='atacado')?4:6;   // atacado: crédito ate 4x s/ juros; varejo: 6x
    for(var n=1;n<=maxP;n++)h+='<option value="'+n+'">'+n+'x de '+money(t/n)+' sem juros</option>';
    var keep=par.value;par.innerHTML=h;if(keep)par.value=keep;
  } else box.style.display='none';
}
function bindForm(sh){
  var doc=document.getElementById('fdoc');if(!doc)return;
  sh.querySelectorAll('input,select').forEach(function(e){e.addEventListener('change',keepForm);e.addEventListener('input',keepForm)});
  document.getElementById('fpag').addEventListener('change',pagChange);
  doc.addEventListener('blur',lookupDoc);
  doc.addEventListener('input',function(){var d=digits(doc.value);if(d.length===11||d.length===14)lookupDoc()});
  var cep=document.getElementById('fcep');
  cep.addEventListener('input',function(){
    var d=digits(cep.value);
    if(d.length===8){fetch('https://viacep.com.br/ws/'+d+'/json/').then(function(r){return r.json()}).then(function(j){
      if(j&&!j.erro){setV('frua',j.logradouro);setV('fbai',j.bairro);setV('fcid',j.localidade);setV('fuf',j.uf);keepForm()}
    }).catch(function(){})}
  });
  document.getElementById('fsend').onclick=sendOrder;
}
function setV(id,v){var e=document.getElementById(id);if(e&&v&&(!e.value||e.value==='******'))e.value=v}
function setV2(id,v){var e=document.getElementById(id);if(e&&v!=null&&v!=='')e.value=v}
var lookedUp='';
function lookupDoc(){
  if(!D.apiBase)return;
  var doc=document.getElementById('fdoc');if(!doc)return;
  var d=digits(doc.value);
  if((d.length!==11&&d.length!==14)||d===lookedUp)return;
  lookedUp=d;
  fetch(D.apiBase+'/api/public/cliente?doc='+d).then(function(r){return r.json()}).then(function(j){
    var n=document.getElementById('fnotice');if(!n)return;
    if(j&&j.found&&j.cliente){
      var c=j.cliente,e=c.endereco||{};
      setV2('fnome',c.nome);setV2('fcel',c.celular);setV2('fcep',e.cep);setV2('fnum',e.numero);
      setV2('frua',e.rua);setV2('fbai',e.bairro);setV2('fcid',e.cidade);setV2('fuf',e.uf);setV2('fcom',e.complemento);
      var vend=document.getElementById('fvend');
      if(vend&&vend.options&&c.vendedoraWiki){var opts=Array.prototype.slice.call(vend.options);
        var m=opts.find(function(o){return o.value&&c.vendedoraWiki.toUpperCase().indexOf(o.value.toUpperCase())>=0||o.value.toUpperCase().indexOf(c.vendedoraWiki.toUpperCase())>=0});
        if(m&&!vend.value)vend.value=m.value}
      keepForm();
      n.textContent='Achamos seu cadastro! Por segurança seu endereço aparece como ****** — só digite por cima se algo mudou. ✓';
      n.classList.add('on');
      ck.found=true;
    } else { n.classList.remove('on'); ck.found=false; }
  }).catch(function(){})
}
function sendOrder(){
  if(ck.sending)return;
  var err=document.getElementById('ferr');err.classList.remove('on');
  function val(id){var e=document.getElementById(id);return e?e.value.trim():''}
  var body={
    source:D.mode,website:val('fweb'),
    cliente:{nome:val('fnome'),doc:val('fdoc'),celular:val('fcel'),
      endereco:{cep:val('fcep'),rua:val('frua'),bairro:val('fbai'),cidade:val('fcid'),uf:val('fuf').toUpperCase(),numero:val('fnum'),complemento:val('fcom')}},
    itens:cart.map(function(x){return {id:x.id,color:x.color,size:x.size,qty:x.qty}}),
    pagamento:{forma:val('fpag'),parcelas:Number(val('fparc')||1)},
    vendedora:val('fvend'),
    tabelaPreco:(D.tabelaPreco||'varejo'),
    promocao:!!D.promocao
  };
  var d=digits(body.cliente.doc);
  var fail='';
  if(body.cliente.nome.length<3)fail='Informe seu nome completo.';
  else if(d.length!==11&&d.length!==14)fail='CPF/CNPJ inválido.';
  else if(digits(body.cliente.celular).length<10)fail='Informe um celular com DDD.';
  else if(!body.pagamento.forma)fail='Escolha a forma de pagamento.';
  else if(!body.vendedora)fail='Escolha a vendedora.';
  if(fail){err.textContent=fail;err.classList.add('on');return}
  ck.sending=true;renderCart();fillForm();
  fetch(D.apiBase+'/api/public/pedido',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j}})})
    .then(function(x){
      if(x.ok&&x.j&&x.j.success&&x.j.id){
        // Pedido salvo -> agora AGUARDA o sistema gerar (load + poll). Só então mostra o resultado.
        cart=[];saveCart();fab();formData={};lookedUp='';
        ck.sending=false;ck.step='loading';renderCart();
        pollStatus(x.j.id,0);
      } else if(x.ok&&x.j&&x.j.success){
        ck.sending=false;cart=[];saveCart();fab();formData={};lookedUp='';ck.step='done';renderCart();
      } else {
        ck.sending=false;renderCart();fillForm();var e2=document.getElementById('ferr');
        var msg=(x.j&&x.j.error)||'Falha ao enviar. Tente de novo.';
        e2.innerHTML=esc(msg)+((x.j&&x.j.hint)?'<br><span style="font-weight:600;opacity:.85">'+esc(x.j.hint)+'</span>':'');
        e2.classList.add('on');
      }
    })
    .catch(function(){ck.sending=false;renderCart();fillForm();var e2=document.getElementById('ferr');e2.textContent='Sem conexão com a loja agora. Tente de novo em instantes.';e2.classList.add('on')});
}
// Aguarda a geração no sistema (o /api/public/pedido lança em segundo plano). Polla o status até
// concluir: OK/erro genérico -> "Pedido enviado"; sem estoque -> mensagem específica; timeout ~40s ->
// "enviado" (segue em background, a vendedora resolve).
function pollStatus(id,tries){
  if(tries>20){ck.step='done';renderCart();return;}
  fetch(D.apiBase+'/api/public/pedido/'+encodeURIComponent(id)+'/status')
    .then(function(r){return r.json()})
    .then(function(s){
      if(!s||!s.done){setTimeout(function(){pollStatus(id,tries+1)},2000);return;}
      if(s.resultado==='sem_estoque'){ck.pecas=Number(s.pecas)||1;ck.avisos=Array.isArray(s.avisos)?s.avisos:[];ck.step='semestoque';renderCart();}
      else{ck.step='done';renderCart();}
    })
    .catch(function(){setTimeout(function(){pollStatus(id,tries+1)},2000);});
}

document.getElementById('q').addEventListener('input',function(e){state.q=e.target.value;grid()});
chips();grid();fab();

// ---------- CARROSSEL DE BANNERS ----------
// Área de altura FIXA (3:1) — o banner se encaixa nela (object-fit:contain, nunca corta)
// e a página NÃO muda de altura na troca (nada de pular conteúdo).
(function(){
  var box=document.getElementById('bslide');if(!box)return;
  var imgs=[].slice.call(box.querySelectorAll('img'));if(imgs.length<2)return;
  var dots=[].slice.call(box.querySelectorAll('.bdot')),cur=0,timer=null;
  function show(i){
    cur=(i+imgs.length)%imgs.length;
    imgs.forEach(function(im,k){im.classList.toggle('on',k===cur)});
    dots.forEach(function(d,k){d.classList.toggle('on',k===cur)});
  }
  function auto(){clearInterval(timer);timer=setInterval(function(){show(cur+1)},4500)}
  dots.forEach(function(d){d.onclick=function(){show(Number(d.getAttribute('data-b')));auto()}});
  auto();
})();
